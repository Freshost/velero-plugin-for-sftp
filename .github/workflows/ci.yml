name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_IMAGE: freshost/velero-plugin-for-sftp
  GHCR_IMAGE: ghcr.io/freshost/velero-plugin-for-sftp

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race ./...

      # Build and push dev image only on push to main (not on PRs)
      - name: Set up QEMU
        if: github.event_name == 'push'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        if: github.event_name == 'push'
        uses: docker/build-and-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:dev-${{ github.sha }}
            ${{ env.DOCKERHUB_IMAGE }}:dev
            ${{ env.GHCR_IMAGE }}:dev-${{ github.sha }}
            ${{ env.GHCR_IMAGE }}:dev
